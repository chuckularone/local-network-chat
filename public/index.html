<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local Network Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #login-container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            width: 90%;
            max-width: 400px;
        }

        #login-container h1 {
            margin-bottom: 20px;
            color: #333;
        }

        #login-container input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
        }

        #login-container button {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }

        #login-container button:hover {
            background: #5568d3;
        }

        #chat-container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            width: 90%;
            max-width: 800px;
            height: 80vh;
            display: none;
            flex-direction: column;
        }

        #chat-header {
            background: #667eea;
            color: white;
            padding: 20px;
            border-radius: 10px 10px 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #chat-header-left h2 {
            margin-bottom: 5px;
        }

        #user-count {
            font-size: 14px;
            opacity: 0.9;
        }

        #chat-header-right {
            display: flex;
            align-items: center;
            position: relative;
        }

        #hamburger-button {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 6px;
            color: white;
            cursor: pointer;
            padding: 8px 10px;
            font-size: 18px;
            line-height: 1;
            transition: background 0.2s;
            display: flex;
            flex-direction: column;
            gap: 4px;
            justify-content: center;
            align-items: center;
        }

        #hamburger-button:hover {
            background: rgba(255, 255, 255, 0.35);
        }

        .hamburger-bar {
            display: block;
            width: 20px;
            height: 2px;
            background: white;
            border-radius: 2px;
        }

        #hamburger-menu {
            display: none;
            position: absolute;
            top: calc(100% + 8px);
            right: 0;
            background: white;
            border-radius: 8px;
            box-shadow: 0 6px 24px rgba(0,0,0,0.18);
            min-width: 180px;
            z-index: 2000;
            overflow: hidden;
        }

        #hamburger-menu.show {
            display: block;
        }

        .menu-item {
            display: flex;
            align-items: center;
            gap: 12px;
            width: 100%;
            padding: 13px 18px;
            background: none;
            border: none;
            color: #333;
            font-size: 15px;
            cursor: pointer;
            text-align: left;
            transition: background 0.15s;
            box-sizing: border-box;
        }

        .menu-item:hover {
            background: #f4f4f4;
        }

        .menu-item + .menu-item {
            border-top: 1px solid #eee;
        }

        .menu-item-icon {
            font-size: 17px;
            width: 22px;
            text-align: center;
            flex-shrink: 0;
        }

        .menu-item-label {
            flex: 1;
        }

        .menu-item-check {
            font-size: 14px;
            color: #667eea;
            width: 16px;
            text-align: right;
            flex-shrink: 0;
        }

        #messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            background: #f5f5f5;
        }

        .message {
            margin-bottom: 15px;
            padding: 10px 15px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .message-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
        }

        .username {
            font-weight: bold;
            color: #667eea;
        }

        .timestamp {
            font-size: 12px;
            color: #999;
        }

        .message-text {
            color: #333;
        }

        .system-message {
            text-align: center;
            color: #999;
            font-size: 14px;
            font-style: italic;
            margin: 10px 0;
        }

        #message-form {
            display: flex;
            padding: 20px;
            background: white;
            border-radius: 0 0 10px 10px;
            border-top: 1px solid #eee;
            gap: 10px;
        }

        #message-input {
            flex: 1;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
        }

        #photo-button {
            padding: 12px 20px;
            background: #f0f0f0;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 20px;
            cursor: pointer;
            transition: background 0.3s;
        }

        #photo-button:hover {
            background: #e0e0e0;
        }

        #photo-input {
            display: none;
        }

        #emoji-button {
            padding: 12px 20px;
            background: #f0f0f0;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 20px;
            cursor: pointer;
            transition: background 0.3s;
        }

        #emoji-button:hover {
            background: #e0e0e0;
        }

        #send-button {
            padding: 12px 30px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }

        #send-button:hover {
            background: #5568d3;
        }

        .photo-message {
            margin-bottom: 15px;
            padding: 10px 15px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .photo-message img {
            max-width: 100%;
            max-height: 400px;
            border-radius: 5px;
            margin-top: 10px;
            cursor: pointer;
        }

        .photo-caption {
            color: #333;
            margin-top: 10px;
        }

        #photo-preview-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        #photo-preview-modal.show {
            display: flex;
        }

        #photo-preview-modal img {
            max-width: 90%;
            max-height: 90%;
            border-radius: 10px;
        }

        #photo-preview-modal-close {
            position: absolute;
            top: 20px;
            right: 30px;
            color: white;
            font-size: 40px;
            cursor: pointer;
            font-weight: bold;
        }

        #emoji-picker {
            position: absolute;
            bottom: 90px;
            right: 20px;
            background: white;
            border: 2px solid #ddd;
            border-radius: 10px;
            padding: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
            display: none;
            width: 320px;
            max-height: 400px;
            overflow-y: auto;
            z-index: 1000;
        }

        #emoji-picker.show {
            display: block;
        }

        .emoji-category {
            margin-bottom: 15px;
        }

        .emoji-category:last-child {
            margin-bottom: 0;
        }

        .emoji-category-title {
            font-size: 12px;
            color: #666;
            margin-bottom: 8px;
            font-weight: bold;
            position: sticky;
            top: 0;
            background: white;
            padding: 5px 0;
            z-index: 1;
        }

        .emoji-grid {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 4px;
            margin-bottom: 5px;
        }

        .emoji {
            font-size: 22px;
            cursor: pointer;
            padding: 8px;
            border-radius: 5px;
            text-align: center;
            transition: background 0.2s;
            user-select: none;
            line-height: 1;
        }

        .emoji:hover {
            background: #f0f0f0;
            transform: scale(1.2);
        }

        .message-actions {
            display: none;
            gap: 5px;
            margin-left: 8px;
        }

        .message:hover .message-actions {
            display: flex;
        }

        .message-actions button {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 14px;
            padding: 2px 5px;
            border-radius: 4px;
            opacity: 0.6;
            transition: opacity 0.2s, background 0.2s;
            line-height: 1;
        }

        .message-actions button:hover {
            opacity: 1;
            background: #f0f0f0;
        }

        .message-header-right {
            display: flex;
            align-items: center;
        }

        .edited-label {
            font-size: 11px;
            color: #bbb;
            margin-left: 6px;
            font-style: italic;
        }

        #change-password-modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 3000;
            justify-content: center;
            align-items: center;
        }

        #change-password-modal.show {
            display: flex;
        }

        #change-password-box {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            width: 90%;
            max-width: 360px;
        }

        #change-password-box h3 {
            margin-bottom: 20px;
            color: #333;
        }

        #change-password-box input {
            width: 100%;
            padding: 10px 12px;
            margin-bottom: 12px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 15px;
            box-sizing: border-box;
        }

        #change-password-box input:focus {
            outline: none;
            border-color: #667eea;
        }

        .change-password-buttons {
            display: flex;
            gap: 10px;
            margin-top: 5px;
        }

        .change-password-buttons button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 5px;
            font-size: 15px;
            cursor: pointer;
            transition: background 0.2s;
        }

        #change-password-submit {
            background: #667eea;
            color: white;
        }

        #change-password-submit:hover {
            background: #5568d3;
        }

        #change-password-cancel {
            background: #f0f0f0;
            color: #333;
        }

        #change-password-cancel:hover {
            background: #e0e0e0;
        }

        #change-password-error {
            color: #e53e3e;
            font-size: 13px;
            margin-bottom: 8px;
            display: none;
        }

        #change-password-success {
            color: #38a169;
            font-size: 13px;
            margin-bottom: 8px;
            display: none;
        }
    </style>
</head>
<body>
    <div id="login-container">
        <h1>Local Network Chat</h1>
        <div id="auth-screen">
            <div id="login-form">
                <h2>Login</h2>
                <input type="text" id="login-username" placeholder="Username" autocomplete="username">
                <input type="password" id="login-password" placeholder="Password" autocomplete="current-password">
                <div style="margin-bottom: 15px;">
                    <label style="display: flex; align-items: center; font-size: 14px; cursor: pointer;">
                        <input type="checkbox" id="remember-me" style="width: auto; margin-right: 8px;">
                        <span>Remain logged in</span>
                    </label>
                </div>
                <button id="login-button">Login</button>
                <div id="login-error" style="color: red; margin-top: 10px; display: none;"></div>
                <p style="margin-top: 15px; font-size: 14px;">
                    Don't have an account? <a href="#" id="show-register">Register here</a>
                </p>
            </div>
            <div id="register-form" style="display: none;">
                <h2>Register</h2>
                <input type="text" id="register-username" placeholder="Username (3+ characters)" autocomplete="username">
                <input type="password" id="register-password" placeholder="Password (6+ characters)" autocomplete="new-password">
                <button id="register-button">Register</button>
                <div id="register-error" style="color: red; margin-top: 10px; display: none;"></div>
                <p style="margin-top: 15px; font-size: 14px;">
                    Already have an account? <a href="#" id="show-login">Login here</a>
                </p>
            </div>
        </div>
    </div>

    <div id="chat-container">
        <div id="chat-header">
            <div id="chat-header-left">
                <h2>Chat Room</h2>
                <div id="user-count">Users online: 0</div>
            </div>
            <div id="chat-header-right">
                <button id="hamburger-button" title="Menu">
                    <span class="hamburger-bar"></span>
                    <span class="hamburger-bar"></span>
                    <span class="hamburger-bar"></span>
                </button>
                <div id="hamburger-menu">
                    <button class="menu-item" id="menu-sound-toggle">
                        <span class="menu-item-icon" id="menu-sound-icon">🔔</span>
                        <span class="menu-item-label">Sound</span>
                        <span class="menu-item-check" id="menu-sound-check">✓</span>
                    </button>
                    <button class="menu-item" id="menu-password-button">
                        <span class="menu-item-icon">🔑</span>
                        <span class="menu-item-label">Change Password</span>
                    </button>
                    <button class="menu-item" id="menu-logout-button">
                        <span class="menu-item-icon">🚪</span>
                        <span class="menu-item-label">Logout</span>
                    </button>
                </div>
            </div>
        </div>
        <div id="messages"></div>
        <div id="emoji-picker">
            <div class="emoji-category">
                <div class="emoji-category-title">Smileys</div>
                <div class="emoji-grid" id="emoji-smileys"></div>
            </div>
            <div class="emoji-category">
                <div class="emoji-category-title">Gestures</div>
                <div class="emoji-grid" id="emoji-gestures"></div>
            </div>
            <div class="emoji-category">
                <div class="emoji-category-title">Hearts</div>
                <div class="emoji-grid" id="emoji-hearts"></div>
            </div>
            <div class="emoji-category">
                <div class="emoji-category-title">Objects</div>
                <div class="emoji-grid" id="emoji-objects"></div>
            </div>
        </div>
        <form id="message-form">
            <input type="file" id="photo-input" accept="image/*">
            <input type="text" id="message-input" placeholder="Type a message..." autocomplete="off">
            <button type="button" id="photo-button">📷</button>
            <button type="button" id="emoji-button">😊</button>
            <button type="submit" id="send-button">Send</button>
        </form>
    </div>

    <div id="change-password-modal">
        <div id="change-password-box">
            <h3>🔑 Change Password</h3>
            <div id="change-password-error"></div>
            <div id="change-password-success"></div>
            <input type="password" id="cp-current" placeholder="Current password" autocomplete="current-password">
            <input type="password" id="cp-new" placeholder="New password (6+ characters)" autocomplete="new-password">
            <input type="password" id="cp-confirm" placeholder="Confirm new password" autocomplete="new-password">
            <div class="change-password-buttons">
                <button id="change-password-submit">Change Password</button>
                <button id="change-password-cancel">Cancel</button>
            </div>
        </div>
    </div>

    <div id="photo-preview-modal">
        <span id="photo-preview-modal-close">&times;</span>
        <img id="photo-preview-img" src="" alt="Preview">
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let username = '';
        let authenticated = false;

        const loginContainer = document.getElementById('login-container');
        const chatContainer = document.getElementById('chat-container');
        
        // Auth elements
        const loginForm = document.getElementById('login-form');
        const registerForm = document.getElementById('register-form');
        const showRegisterLink = document.getElementById('show-register');
        const showLoginLink = document.getElementById('show-login');
        const loginUsername = document.getElementById('login-username');
        const loginPassword = document.getElementById('login-password');
        const loginButton = document.getElementById('login-button');
        const loginError = document.getElementById('login-error');
        const rememberMeCheckbox = document.getElementById('remember-me');
        const registerUsername = document.getElementById('register-username');
        const registerPassword = document.getElementById('register-password');
        const registerButton = document.getElementById('register-button');
        const registerError = document.getElementById('register-error');
        
        const messagesDiv = document.getElementById('messages');
        const messageForm = document.getElementById('message-form');
        const messageInput = document.getElementById('message-input');
        const userCount = document.getElementById('user-count');
        const emojiButton = document.getElementById('emoji-button');
        const emojiPicker = document.getElementById('emoji-picker');
        const photoButton = document.getElementById('photo-button');
        const photoInput = document.getElementById('photo-input');
        const photoPreviewModal = document.getElementById('photo-preview-modal');
        const photoPreviewImg = document.getElementById('photo-preview-img');
        const photoPreviewModalClose = document.getElementById('photo-preview-modal-close');
        const hamburgerButton = document.getElementById('hamburger-button');
        const hamburgerMenu = document.getElementById('hamburger-menu');
        const menuSoundToggle = document.getElementById('menu-sound-toggle');
        const menuPasswordButton = document.getElementById('menu-password-button');
        const menuLogoutButton = document.getElementById('menu-logout-button');

        // Sound state (on by default)
        let soundEnabled = true;

        // Hamburger toggle
        hamburgerButton.addEventListener('click', (e) => {
            e.stopPropagation();
            hamburgerMenu.classList.toggle('show');
        });

        // Close menu when clicking outside
        document.addEventListener('click', (e) => {
            if (!hamburgerMenu.contains(e.target) && e.target !== hamburgerButton) {
                hamburgerMenu.classList.remove('show');
            }
        });

        // Sound toggle menu item
        menuSoundToggle.addEventListener('click', () => {
            soundEnabled = !soundEnabled;
            document.getElementById('menu-sound-icon').textContent = soundEnabled ? '🔔' : '🔕';
            document.getElementById('menu-sound-check').textContent = soundEnabled ? '✓' : '';
            hamburgerMenu.classList.remove('show');
        });

        // Logout handler
        menuLogoutButton.addEventListener('click', () => {
            hamburgerMenu.classList.remove('show');
            if (confirm('Are you sure you want to log out?')) {
                localStorage.removeItem('chatUsername');
                location.reload();
            }
        });

        // Change password
        const changePasswordModal = document.getElementById('change-password-modal');
        const changePasswordSubmit = document.getElementById('change-password-submit');
        const changePasswordCancel = document.getElementById('change-password-cancel');
        const cpCurrent = document.getElementById('cp-current');
        const cpNew = document.getElementById('cp-new');
        const cpConfirm = document.getElementById('cp-confirm');
        const cpError = document.getElementById('change-password-error');
        const cpSuccess = document.getElementById('change-password-success');

        function openChangePasswordModal() {
            cpCurrent.value = '';
            cpNew.value = '';
            cpConfirm.value = '';
            cpError.style.display = 'none';
            cpSuccess.style.display = 'none';
            changePasswordModal.classList.add('show');
            cpCurrent.focus();
        }

        function closeChangePasswordModal() {
            changePasswordModal.classList.remove('show');
        }

        function showCpError(msg) {
            cpError.textContent = msg;
            cpError.style.display = 'block';
            cpSuccess.style.display = 'none';
        }

        menuPasswordButton.addEventListener('click', () => {
            hamburgerMenu.classList.remove('show');
            openChangePasswordModal();
        });
        changePasswordCancel.addEventListener('click', closeChangePasswordModal);

        changePasswordModal.addEventListener('click', (e) => {
            if (e.target === changePasswordModal) closeChangePasswordModal();
        });

        // Submit on Enter in confirm field
        cpConfirm.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') submitChangePassword();
        });

        changePasswordSubmit.addEventListener('click', submitChangePassword);

        function submitChangePassword() {
            const current = cpCurrent.value;
            const newPw = cpNew.value;
            const confirm = cpConfirm.value;

            if (!current || !newPw || !confirm) {
                showCpError('Please fill in all fields');
                return;
            }
            if (newPw.length < 6) {
                showCpError('New password must be at least 6 characters');
                return;
            }
            if (newPw !== confirm) {
                showCpError('New passwords do not match');
                return;
            }
            if (current === newPw) {
                showCpError('New password must be different from current password');
                return;
            }

            changePasswordSubmit.disabled = true;
            changePasswordSubmit.textContent = 'Changing...';
            socket.emit('change password', { currentPassword: current, newPassword: newPw });
        }

        socket.on('change password success', () => {
            changePasswordSubmit.disabled = false;
            changePasswordSubmit.textContent = 'Change Password';
            cpError.style.display = 'none';
            cpSuccess.textContent = 'Password changed successfully!';
            cpSuccess.style.display = 'block';
            cpCurrent.value = '';
            cpNew.value = '';
            cpConfirm.value = '';
            setTimeout(closeChangePasswordModal, 1500);
        });

        socket.on('change password failed', (msg) => {
            changePasswordSubmit.disabled = false;
            changePasswordSubmit.textContent = 'Change Password';
            showCpError(msg);
        });

        // Function to play notification chime
        function playChime() {
            if (soundEnabled) {
                chimeAudio.play().catch(err => {
                    console.log('Could not play chime:', err);
                });
            }
        }

        // Check for saved session on page load
        const savedUsername = localStorage.getItem('chatUsername');
        if (savedUsername) {
            console.log('Found saved session for:', savedUsername);
            username = savedUsername;
            loginContainer.style.display = 'none';
            chatContainer.style.display = 'flex';
            messageInput.focus();
            
            // Mark socket as authenticated and join
            socket.emit('auto-login', savedUsername);
        }

        // Emoji collections
        const emojis = {
            smileys: ['😀', '😃', '😄', '😁', '😆', '😅', '🤣', '😂', '☠', '🙂', '🙃', '😉', '😊', '😇', '🥰', '😍', '🤩', '😘', '😗', '😚', '😙', '😋', '😛', '😜', '🤪', '😝', '🤑', '🤗', '🤭', '🤫', '🤔', '🤐', '🤨', '😐', '😑', '😶', '😏', '😒', '🙄', '😬', '🤥', '😌', '😔', '😪', '🤤', '😴'],
            gestures: ['👋', '🤚', '🖐', '✋', '🖖', '👌', '🤏', '✌️', '🤞', '🤟', '🤘', '🤙', '👈', '👉', '👆', '🖕', '👇', '☝️', '👍', '👎', '✊', '👊', '🤛', '🤜', '👏', '🙌', '👐', '🤲', '🤝', '🙏'],
            hearts: ['❤️', '🧡', '💛', '💚', '💙', '💜', '🤎', '🖤', '🤍', '💔', '❣️', '💕', '💞', '💓', '💗', '💖', '💘', '💝', '💟'],
            objects: ['⭐', '💯', '🌟', '✨', '⚡', '🔥', '💥', '💫', '💦', '💨', '🎉', '🎊', '🎈', '🎁', '🏆', '🔫', '🥇', '🥈', '🥉', '⚽', '🏀', '🎮', '🎯', '🎲', '🎸', '🎵', '🎶', '📱', '💻', '⌚', '📷', '🎥', '☕', '🍕', '🍔', '🍟', '🌮', '🍦', '🍰', '🎂','🗡️','⚔️','💣','🔧','🧪','🧫','🔬','💉','🩹','🩺','🛏️','🛋️','🚽','🕛','🕧','🕐','🕜','🕑','🕝','🕒','🕞','🕓','🕟','🕔','🕠','🕕','🕡','🕖','🕢','🕗','🕣','🕘','🕤','🕙','🕥','🕚','🕦']
		};

        // Populate emoji picker
        function populateEmojis() {
            Object.keys(emojis).forEach(category => {
                const container = document.getElementById(`emoji-${category}`);
                emojis[category].forEach(emoji => {
                    const span = document.createElement('span');
                    span.className = 'emoji';
                    span.textContent = emoji;
                    span.onclick = () => insertEmoji(emoji);
                    container.appendChild(span);
                });
            });
        }

        // Toggle emoji picker
        emojiButton.addEventListener('click', () => {
            emojiPicker.classList.toggle('show');
        });

        // Close emoji picker when clicking outside
        document.addEventListener('click', (e) => {
            if (!emojiPicker.contains(e.target) && e.target !== emojiButton) {
                emojiPicker.classList.remove('show');
            }
        });

        // Insert emoji at cursor position
        function insertEmoji(emoji) {
            const start = messageInput.selectionStart;
            const end = messageInput.selectionEnd;
            const text = messageInput.value;
            messageInput.value = text.substring(0, start) + emoji + text.substring(end);
            messageInput.focus();
            messageInput.selectionStart = messageInput.selectionEnd = start + emoji.length;
            emojiPicker.classList.remove('show');
        }

        // Initialize emojis on page load
        populateEmojis();

        // Photo upload functionality
        photoButton.addEventListener('click', () => {
            photoInput.click();
        });

        photoInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) {
                return;
            }
            
            console.log('File selected:', file.name, 'Type:', file.type, 'Size:', file.size);
            
            if (!file.type.startsWith('image/')) {
                alert('Please select an image file.');
                photoInput.value = '';
                return;
            }
            
            // Check file size (limit to 5MB)
            if (file.size > 5 * 1024 * 1024) {
                alert('Image too large! Please choose an image under 5MB.');
                photoInput.value = '';
                return;
            }

            const reader = new FileReader();
            reader.onerror = (error) => {
                console.error('FileReader error:', error);
                alert('Error reading file. Please try again.');
                photoInput.value = '';
            };
            
            reader.onload = (event) => {
                try {
                    if (!username) {
                        console.error('No username set when uploading photo');
                        alert('Error: Not logged in');
                        photoInput.value = '';
                        return;
                    }
                    
                    const caption = prompt('Add a caption (optional):');
                    
                    // User cancelled the prompt
                    if (caption === null) {
                        photoInput.value = '';
                        return;
                    }
                    
                    console.log('Emitting photo message for user:', username);
                    socket.emit('photo message', {
                        username,
                        photo: event.target.result,
                        caption: caption || ''
                    });
                    photoInput.value = '';
                } catch (error) {
                    console.error('Error processing photo:', error);
                    alert('Error uploading photo. Please try again.');
                    photoInput.value = '';
                }
            };
            reader.readAsDataURL(file);
        });

        // Photo preview modal
        photoPreviewModalClose.addEventListener('click', () => {
            photoPreviewModal.classList.remove('show');
        });

        photoPreviewModal.addEventListener('click', (e) => {
            if (e.target === photoPreviewModal) {
                photoPreviewModal.classList.remove('show');
            }
        });

        function showPhotoPreview(src) {
            photoPreviewImg.src = src;
            photoPreviewModal.classList.add('show');
        }

        // Toggle between login and register forms
        showRegisterLink.addEventListener('click', (e) => {
            e.preventDefault();
            loginForm.style.display = 'none';
            registerForm.style.display = 'block';
            registerError.style.display = 'none';
        });

        showLoginLink.addEventListener('click', (e) => {
            e.preventDefault();
            registerForm.style.display = 'none';
            loginForm.style.display = 'block';
            loginError.style.display = 'none';
        });

        // Handle login
        function loginPasswordHandler(e) {
            if (e.key === 'Enter' && loginContainer.style.display !== 'none') handleLogin();
        }
        
        loginButton.addEventListener('click', handleLogin);
        loginPassword.addEventListener('keypress', loginPasswordHandler);

        function handleLogin() {
            const usernameVal = loginUsername.value.trim();
            const passwordVal = loginPassword.value;
            
            if (!usernameVal || !passwordVal) {
                loginError.textContent = 'Please enter username and password';
                loginError.style.display = 'block';
                return;
            }
            
            socket.emit('login', { username: usernameVal, password: passwordVal });
        }

        // Handle registration
        function registerPasswordHandler(e) {
            if (e.key === 'Enter' && loginContainer.style.display !== 'none') handleRegister();
        }
        
        registerButton.addEventListener('click', handleRegister);
        registerPassword.addEventListener('keypress', registerPasswordHandler);

        function handleRegister() {
            const usernameVal = registerUsername.value.trim();
            const passwordVal = registerPassword.value;
            
            if (!usernameVal || !passwordVal) {
                registerError.textContent = 'Please fill in all fields';
                registerError.style.display = 'block';
                return;
            }
            
            if (usernameVal.length < 3) {
                registerError.textContent = 'Username must be at least 3 characters';
                registerError.style.display = 'block';
                return;
            }
            
            if (passwordVal.length < 6) {
                registerError.textContent = 'Password must be at least 6 characters';
                registerError.style.display = 'block';
                return;
            }
            
            socket.emit('register', { username: usernameVal, password: passwordVal });
        }

        // Login/Register responses
        socket.on('login success', (usernameVal) => {
            console.log('Login successful for:', usernameVal);
            username = usernameVal;
            
            // Save to localStorage if remember me is checked
            if (rememberMeCheckbox.checked) {
                localStorage.setItem('chatUsername', usernameVal);
                console.log('Saved session to localStorage');
            } else {
                localStorage.removeItem('chatUsername');
            }
            
            // Remove login event listeners to prevent interference
            loginPassword.removeEventListener('keypress', loginPasswordHandler);
            
            loginContainer.style.display = 'none';
            chatContainer.style.display = 'flex';
            messageInput.focus();
            
            console.log('Emitting join event for:', username);
            socket.emit('join', username);
        });

        socket.on('login failed', (message) => {
            loginError.textContent = message;
            loginError.style.display = 'block';
            loginPassword.value = '';
        });

        socket.on('register success', (usernameVal) => {
            username = usernameVal;
            
            // Auto-save session for new registrations
            localStorage.setItem('chatUsername', usernameVal);
            console.log('Saved new user session to localStorage');
            
            // Remove register event listeners to prevent interference
            registerPassword.removeEventListener('keypress', registerPasswordHandler);
            
            loginContainer.style.display = 'none';
            chatContainer.style.display = 'flex';
            messageInput.focus();
            socket.emit('join', username);
        });

        socket.on('register failed', (message) => {
            registerError.textContent = message;
            registerError.style.display = 'block';
        });

        // Handle auth required event
        socket.on('auth required', () => {
            console.error('Authentication required - session may have expired');
            alert('Session expired. Please log in again.');
            localStorage.removeItem('chatUsername');
            location.reload();
        });

        // Handle auto-login failure
        socket.on('auto-login failed', () => {
            console.log('Auto-login failed - clearing saved session');
            localStorage.removeItem('chatUsername');
            loginContainer.style.display = 'block';
            chatContainer.style.display = 'none';
        });

        // Handle auto-login success
        socket.on('auto-login success', (usernameVal) => {
            console.log('Auto-login success, joining chat');
            username = usernameVal;
            socket.emit('join', username);
        });

        // Handle socket errors
        socket.on('error', (error) => {
            console.error('Socket error:', error);
        });

        socket.on('connect_error', (error) => {
            console.error('Connection error:', error);
        });

        socket.on('disconnect', (reason) => {
            console.log('Disconnected:', reason);
            if (reason === 'io server disconnect') {
                // Server disconnected us - try to reconnect
                socket.connect();
            }
        });

        // Load chat history
        socket.on('chat history', (history) => {
            // Process each item in chronological order
            history.forEach(item => {
                if (item.type === 'message') {
                    messagesDiv.appendChild(createMessageEl(item));
                } else if (item.type === 'photo') {
                    // Display photo
                    const messageEl = document.createElement('div');
                    messageEl.className = 'photo-message';
                    
                    const header = document.createElement('div');
                    header.className = 'message-header';
                    header.innerHTML = `
                        <span class="username">${escapeHtml(item.username)}</span>
                        <span class="timestamp">${item.timestamp}</span>
                    `;
                    
                    const img = document.createElement('img');
                    img.src = item.photo;
                    img.alt = 'Shared photo';
                    img.onclick = () => showPhotoPreview(item.photo);
                    
                    messageEl.appendChild(header);
                    messageEl.appendChild(img);
                    
                    if (item.caption) {
                        const caption = document.createElement('div');
                        caption.className = 'photo-caption';
                        caption.textContent = item.caption;
                        messageEl.appendChild(caption);
                    }
                    
                    messagesDiv.appendChild(messageEl);
                }
            });

            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        });

        // Send message
        messageForm.addEventListener('submit', (e) => {
            e.preventDefault();
            
            // Make sure user is logged in
            if (!username) {
                console.error('No username set');
                alert('Error: Not logged in');
                return;
            }
            
            const message = messageInput.value.trim();
            if (message) {
                console.log('Sending message:', message, 'from:', username);
                socket.emit('chat message', { username, message });
                messageInput.value = '';
            }
        });

        // Receive messages
        socket.on('chat message', (data) => {
            messagesDiv.appendChild(createMessageEl(data));
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
            
            // Play chime for new messages (but not from yourself)
            if (data.username !== username) {
                playChime();
            }
        });

        // Receive photo messages
        socket.on('photo message', (data) => {
            const messageEl = document.createElement('div');
            messageEl.className = 'photo-message';
            
            const header = document.createElement('div');
            header.className = 'message-header';
            header.innerHTML = `
                <span class="username">${escapeHtml(data.username)}</span>
                <span class="timestamp">${data.timestamp}</span>
            `;
            
            const img = document.createElement('img');
            img.src = data.photo;
            img.alt = 'Shared photo';
            img.onclick = () => showPhotoPreview(data.photo);
            
            messageEl.appendChild(header);
            messageEl.appendChild(img);
            
            if (data.caption) {
                const caption = document.createElement('div');
                caption.className = 'photo-caption';
                caption.textContent = data.caption;
                messageEl.appendChild(caption);
            }
            
            messagesDiv.appendChild(messageEl);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
            
            // Play chime for new photos (but not from yourself)
            if (data.username !== username) {
                playChime();
            }
        });

        // User joined
        socket.on('user joined', (data) => {
            const systemMsg = document.createElement('div');
            systemMsg.className = 'system-message';
            systemMsg.textContent = `${data.username} joined the chat`;
            messagesDiv.appendChild(systemMsg);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
            userCount.textContent = `Users online: ${data.userCount}`;
        });

        // User left
        socket.on('user left', (data) => {
            const systemMsg = document.createElement('div');
            systemMsg.className = 'system-message';
            systemMsg.textContent = `${data.username} left the chat`;
            messagesDiv.appendChild(systemMsg);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
            userCount.textContent = `Users online: ${data.userCount}`;
        });

        // Escape HTML to prevent XSS, then convert newlines to <br>
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatMessage(text) {
            return escapeHtml(text).replace(/\n/g, '<br>');
        }

        // Create a message DOM element, with edit/delete actions for own messages
        function createMessageEl(data) {
            const messageEl = document.createElement('div');
            messageEl.className = 'message';
            if (data.id) {
                messageEl.dataset.id = data.id;
                messageEl.dataset.username = data.username;
            }

            const isOwn = data.username === username;
            const actionsHtml = isOwn ? `
                <div class="message-actions">
                    <button class="edit-btn" title="Edit">✏️</button>
                    <button class="delete-btn" title="Delete">🗑️</button>
                </div>` : '';

            messageEl.innerHTML = `
                <div class="message-header">
                    <span class="username">${escapeHtml(data.username)}</span>
                    <div class="message-header-right">
                        <span class="timestamp">${data.timestamp}</span>
                        ${actionsHtml}
                    </div>
                </div>
                <div class="message-text">${formatMessage(data.message)}</div>
            `;

            if (isOwn && data.id) {
                messageEl.querySelector('.edit-btn').addEventListener('click', () => handleEditMessage(data.id, messageEl));
                messageEl.querySelector('.delete-btn').addEventListener('click', () => handleDeleteMessage(data.id, messageEl));
            }

            return messageEl;
        }

        function handleEditMessage(id, messageEl) {
            const currentText = messageEl.querySelector('.message-text').textContent;
            const newText = prompt('Edit your message:', currentText);
            if (newText === null || newText.trim() === '' || newText.trim() === currentText) return;
            socket.emit('edit message', { id, newMessage: newText.trim() });
        }

        function handleDeleteMessage(id, messageEl) {
            if (!confirm('Delete this message?')) return;
            socket.emit('delete message', { id });
        }

        // Handle edit/delete confirmations from server
        socket.on('message edited', (data) => {
            const el = document.querySelector(`.message[data-id="${data.id}"]`);
            if (el) {
                el.querySelector('.message-text').innerHTML = formatMessage(data.newMessage);
                // Add or update "(edited)" label
                let editedLabel = el.querySelector('.edited-label');
                if (!editedLabel) {
                    editedLabel = document.createElement('span');
                    editedLabel.className = 'edited-label';
                    editedLabel.textContent = '(edited)';
                    el.querySelector('.timestamp').after(editedLabel);
                }
            }
        });

        socket.on('message deleted', (data) => {
            const el = document.querySelector(`.message[data-id="${data.id}"]`);
            if (el) el.remove();
        });

        socket.on('edit failed', (msg) => alert('Edit failed: ' + msg));
        socket.on('delete failed', (msg) => alert('Delete failed: ' + msg));
    </script>
</body>
</html>
